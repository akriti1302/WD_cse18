<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>conditional statements in js</title>
</head>
<body>
    <script>
        let age=19;
        if(age>=18){
            console.log("valid age");
        }
        else{
            console.log("not valid age");
        }
        //switch case
        let grade='A';
        switch(grade){
            case 'A': result="first divion";
            break;
            case 'B': result="second division";
            break;
            case 'C': result="third division";
            break;
            default: result="fail";
        }
        console.log(result);
    </script>
</body>
</html>
