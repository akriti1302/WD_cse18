<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
     //loops: used to repeatedly run a block of code until a specific condition is met 
     // for loop : used when you know the number of iterations in advance 
     let studentList=["akriti","priya","sneha","shreya","priyanshi","priyanka"];
        for(let i=0;i<studentList.length;i++){
            console.log(studentList[i]);
        }
        //while loop....
        let x=0;
        while(x<studentList.length){
            console.log(studentList[x]);
            x++;

        }
        //for.....of: iterates over the values of an iterable object (like array, string,  maps and sets).
        for( let y of studentList){
            console.log(y);
        }
        </script>
</body>
</html>
